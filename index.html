<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drake Cinematic Edit</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- BACKGROUND LAYERS -->
<div class="bg"></div>
<div class="vignette"></div>

<!-- SIDE POEMS -->
<div class="side-poem left">DRAKE • ENERGY • LEGACY • MOTION • SOUND</div>
<div class="side-poem right">REVERSE • AURA • ECHO • LIGHT • TIME</div>

<!-- MAIN POEM -->
<div class="poem">
  <p>
    Started from silence, now echoes remain,<br>
    Voices rewind through the code of the night,<br>
    Every beat carries the weight of the flame,<br>
    Shadow to legend dissolving in light.
  </p>
</div>

<!-- HIGHWAY -->
<div class="highway" id="highway"></div>

<!-- DRAKE IMAGES -->
<div class="drake-images">
  <img src="https://i.guim.co.uk/img/media/642434679a01800325da6e99dfdef5b6e65b594a/63_0_4626_3702/master/4626.jpg" class="drake-img">
  <img src="https://i8.amplience.net/i/naras/drake_MI0005316097-MN0001035294" class="drake-img">
  <img src="https://i8.amplience.net/i/naras/gettyimages-927349122.jpg.jpg" class="drake-img">
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQjXyHhjdmTR5pALuc4WrUkAogG3b08AeS88Q&s" class="drake-img">
</div>

<!-- CINEMATIC CAMERA -->
<div class="camera" id="camera">
  <iframe 
    src="https://www.youtube.com/embed/9OeaakM72r0?autoplay=1&mute=0"
    allow="autoplay"
    allowfullscreen>
  </iframe>
</div>

<!-- EFFECTS -->
<div class="aura" id="aura"></div>
<div class="flash"></div>
<div class="captions" id="captions"></div>

<script src="script.js"></script>
</body>
</html>
