<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drake Cinematic Edit</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- BACKGROUND -->
<div class="bg"></div>
<div class="vignette"></div>

<!-- SIDE POEMS (ONLY SIDES) -->
<div class="side-poem left">
  started from silence<br>
  echoes in motion<br>
  night bends reality<br>
  sound becomes memory<br>
  legacy is written in motion<br>
</div>

<div class="side-poem right">
  reverse the moment<br>
  aura expands<br>
  time dissolves<br>
  frames keep bleeding<br>
  nothing stays still<br>
</div>

<!-- CAMERA -->
<div class="camera" id="camera">
  <iframe 
    id="video"
    src="https://www.youtube.com/embed/9OeaakM72r0?autoplay=1&mute=0"
    allowfullscreen>
  </iframe>
</div>

<!-- EFFECTS -->
<div class="flash"></div>
<div class="captions" id="captions"></div>

<!-- CREDIT -->
<div class="credits">
  made by Keona, Nikhil, Melusi, Nsovo and Kganya
</div>

<script src="script.js"></script>
</body>
</html>
