<div class="side-poem left-poem">
  Drake • Energy • Legacy • 6 • Motion • Time • Sound
</div>

<div class="side-poem right-poem">
  Reverse • Echo • Flame • Aura • Vision • Rise • Repeat
</div>

<div class="poem">
  <p>
    Started from silence, now echoes remain,<br>
    Voices rewind through the code of the night,<br>
    Every beat backwards still carries the flame,<br>
    Shadow to legend, outlasting the light.
  </p>
</div>
